<!DOCTYPE html>
<html>
<head>
    <title>Birth Certificate</title>
    <!-- ?????? ????????? -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

    <!-- ???? ???? SVG ?? ???? ?????? ???? -->
    <div id="certificate-container">
        <!-- ???? ??????? SVG ??? ???? ????? ???? -->
        <svg id="svg1" width="793" height="1122" ...>
            <!-- ???? ?????? ??, ???? ?? ???? ????: -->
            <g id="g197">
                <svg id="barcode" x="50" y="50" width="200" height="50"></svg>
            </g>
        </svg>
    </div>

    <script>
        function updateBarcode() {
            let base = "10322019030"; //
            let randomNum = Math.floor(Math.random() * 900 + 100); // 3 
            let fullNumber = base + randomNum;

            // ?????? ?? ????? ????
            JsBarcode("#barcode", fullNumber, {
                format: "CODE128",
                width: 2,
                height: 50,
                displayValue: true
            });
        }
        // ??? ??? ???? ?? ?????? ????? ????
        updateBarcode();
        
        // ?? 10 ????? ??? ???? ??? ??????
        setInterval(updateBarcode, 10000);
    </script>
</body>
</html>
