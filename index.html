    <script>
document.addEventListener("DOMContentLoaded", function () {

    const img = document.getElementById("image248");
    if (!img) return;

    const STORAGE_KEY = "custom_signature_image248";

    // Original Signature
    const original =
        img.getAttribute("href") ||
        img.getAttributeNS("http://www.w3.org/1999/xlink", "href");

    // Restore Saved Signature
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        img.setAttributeNS("http://www.w3.org/1999/xlink", "href", saved);
        img.setAttribute("href", saved);
    }

    // Hidden File Picker
    const picker = document.createElement("input");
    picker.type = "file";
    picker.accept = "image/png,image/jpeg,image/webp";
    picker.style.display = "none";
    document.body.appendChild(picker);

    // Mouse Pointer
    img.style.cursor = "pointer";

    // Click on Signature
    img.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        picker.value = "";
        picker.click();
    });

    // Upload Signature
    picker.addEventListener("change", function () {

        if (!this.files.length) return;

        const file = this.files[0];

        const reader = new FileReader();

        reader.onload = function (e) {

            img.setAttributeNS(
                "http://www.w3.org/1999/xlink",
                "href",
                e.target.result
            );

            img.setAttribute("href", e.target.result);

            localStorage.setItem(STORAGE_KEY, e.target.result);

        };

        reader.readAsDataURL(file);

    });

    // Reset Support
    const resetBtn = document.getElementById("resetBtn");

    if (resetBtn) {

        resetBtn.addEventListener("click", function () {

            localStorage.removeItem(STORAGE_KEY);

            img.setAttributeNS(
                "http://www.w3.org/1999/xlink",
                "href",
                original
            );

            img.setAttribute("href", original);

        });

    }

});
</script>
