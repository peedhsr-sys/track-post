<script><![CDATA[
function getNextBarcodeNumber() {
  var stored = localStorage.getItem('certCounter');
  var counter;
  if (stored === null) {
    counter = 864;
  } else {
    counter = parseInt(stored, 10) + 1;
  }
  localStorage.setItem('certCounter', counter);
  var suffix = counter.toString();
  while (suffix.length < 3) {
    suffix = '0' + suffix;
  }
  return suffix;
}

function renderBarcode() {
  var base = "10322019030";
  var suffix = getNextBarcodeNumber();
  var fullNumber = base + suffix;
  JsBarcode("#barcodeSvg", fullNumber, {
    format: "CODE128",
    lineColor: "#000000",
    width: 1.3,
    height: 45,
    displayValue: true,
    fontSize: 11,
    margin: 0
  });
  return fullNumber;
}

function downloadCertificatePDF() {
  html2canvas(document.body, {scale: 2}).then(function(canvas) {
    var imgData = canvas.toDataURL('image/png');
    var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
    var pdfWidth = pdf.internal.pageSize.getWidth();
    var pdfHeight = (canvas.height * pdfWidth) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    pdf.save('certificate.pdf');
  });
}

document.addEventListener('DOMContentLoaded', function () {
  renderBarcode();
  var btn = document.getElementById('fetchDownloadBtn');
  if (btn) {
    btn.addEventListener('click', function () {
      renderBarcode();
      setTimeout(downloadCertificatePDF, 300);
    });
  }
});
]]></script>
