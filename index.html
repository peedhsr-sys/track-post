<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Post Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h2 {
            color: #d32f2f;
        }
        input {
            padding: 12px;
            width: 70%;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover {
            background-color: #b71c1c;
        }
        #tracking-result {
            margin-top: 30px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>India Post Consignment Tracker</h2>
        <p>अपना ट्रैकिंग नंबर नीचे दर्ज करें:</p>
        
        <input type="text" id="track-input" placeholder="उदाहरण: EA123456789IN">
        <br>
        <button onclick="trackPackage()">Track Data Fetch</button>

        <!-- यहीं पर ट्रैकिंग का सीधा डेटा शो होगा -->
        <div id="tracking-result"></div>
    </div>

    <!-- ट्रैकिंग सिस्टम को काम कराने वाली स्क्रिप्ट -->
    <script type="text/javascript" src="//www.17track.net/externalcall.js"></script>
    <script type="text/javascript">
        function trackPackage() {
            var trackingNumber = document.getElementById("track-input").value.trim();
            
            if(trackingNumber === ""){
                alert("कृपया Consignment Number डालें!");
                return;
            }
            
            // यह कोड सीधे डेटा लाकर 'tracking-result' वाले डब्बे में डाल देगा
            YQV5.trackMulti({
                YQ_ContainerId: "tracking-result",
                YQ_Height: 500,
                YQ_Fc: "0",
                YQ_Lang: "en",
                YQ_Num: trackingNumber
            });
        }
    </script>

</body>
</html>
